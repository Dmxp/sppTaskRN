services:
  postgres:
    image: postgres:17
    container_name: spp_postgres
    restart: always
    environment:
      POSTGRES_DB: spp_db
      POSTGRES_USER: spp_user
      POSTGRES_PASSWORD: spp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:8
    container_name: spp_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: spp_backend
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
  
  frontend:
    build:
      context: ./frontend
    container_name: spp_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data: